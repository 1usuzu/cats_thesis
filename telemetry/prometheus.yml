global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "cats-orchestrator"
    metrics_path: /metrics
    static_configs:
      - targets: ["orchestrator:8080"]
        labels:
          service: orchestrator

  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

